name: trans-on-create-branch
on:
  push:
    branches-ignore:
      - 'dependabot/**'
      - main

env:
  REGISTRY: ghcr.io

jobs:
  pull_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Clean up Docker to free space
        run: |
          docker system prune -a -f --volumes
          docker volume prune -f
      - name: Pull Docker image
        run: |
          docker pull ${{ github.ref_name }}
      - name: Log in to the Container registry
        uses: docker/login-action@9f4a8ea54ed9055d5f86c993e1f2ffa674f98344
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: reTag and push Docker image
        run: |
          # image_name=$(basename "${{ github.ref_name }}")
          image_name="${{ github.ref_name }}"
          full_image_name=${{ env.REGISTRY }}/${{ github.actor }}/$image_name
          echo "image name is: $image_name, full image name is: $full_image_name"
          docker tag ${{ github.ref_name }} ${full_image_name}
          docker push ${full_image_name}
